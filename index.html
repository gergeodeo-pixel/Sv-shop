<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SV SCRIPTS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
padding:30px;
text-align:center;
font-size:32px;
background:#1a1a1a;
font-weight:bold;
}

.shop{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
padding:30px;
}

.card{
width:300px;
background:#222;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,255,255,.15);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-size:24px;
margin-bottom:10px;
}

.desc{
color:#bbb;
margin-bottom:15px;
}

.price{
color:lime;
font-size:20px;
margin-bottom:15px;
}

.button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#4a7cff;
color:white;
cursor:pointer;
}

#success{
display:none;
text-align:center;
padding:40px;
}

textarea{
width:90%;
height:100px;
background:#222;
color:white;
border:none;
padding:10px;
}
</style>
</head>

<body>

<header>
SV SCRIPTS
</header>

<div class="shop">

<div class="card">

<img src="IMG_0205.jpeg">

<div class="info">

<div class="title">
TP Bat
</div>

<div class="desc">
HELPS BYPASS ANTI BAT
</div>

<div class="price">
$1
</div>

<button class="button"
onclick="buy('TP Bat')">
PURCHASE
</button>

</div>
</div>


<div class="card">

<img src="IMG_0205.jpeg">

<div class="info">

<div class="title">
Duel Script
</div>

<div class="desc">
DUEL SCRIPT INCLUDES ANTI BAT AND OTHER SCRIPTS
</div>

<div class="price">
$5
</div>

<button class="button"
onclick="buy('Duel Script')">
PURCHASE
</button>

</div>
</div>

</div>

<div id="success">

<h1>✅ Purchase Successful</h1>

<p>Your script:</p>

<textarea id="scriptBox">
YOUR SCRIPT GOES HERE
</textarea>

<br><br>

<button class="button"
onclick="copyScript()">
Copy Script
</button>

</div>

<script>

function buy(item){

/*
REPLACE THIS LATER WITH STRIPE:

window.location.href="YOUR_STRIPE_LINK"

*/

document.querySelector(".shop").style.display="none";

document.getElementById("success").style.display="block";

}

function copyScript(){

let script=
document.getElementById("scriptBox");

script.select();

navigator.clipboard.writeText(script.value);

alert("Script copied!");

}

</script>

</body>
</html>
