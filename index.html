<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SV SCRIPTS</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
text-align:center;
padding:30px;
font-size:32px;
font-weight:bold;
background:#1a1a1a;
}

.shop{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
padding:30px;
}

.card{
width:300px;
background:#222;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,255,255,.15);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.info{
padding:15px;
}

.title{
font-size:24px;
margin-bottom:10px;
}

.desc{
color:#bbb;
margin-bottom:15px;
}

.price{
font-size:20px;
color:lime;
margin-bottom:15px;
}

.button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#4a7cff;
color:white;
font-size:16px;
cursor:pointer;
}

.box{
display:none;
background:#222;
padding:25px;
width:300px;
border-radius:15px;
text-align:center;
margin:auto;
margin-bottom:50px;
box-shadow:0 0 15px rgba(255,255,255,.15);
}

input{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:10px;
background:#333;
color:white;
}
</style>

</head>

<body>

<header>
SV SCRIPTS
</header>

<div class="shop">

<div class="card">
<img src="IMG_0205.jpeg">

<div class="info">
<div class="title">TP Bat</div>
<div class="desc">
HELPS BYPASS ANTI BAT
</div>
<div class="price">$1</div>

<button class="button" onclick="showCheckout('TP Bat','$1')">
PURCHASE
</button>

</div>
</div>


<div class="card">
<img src="IMG_0205.jpeg">

<div class="info">
<div class="title">Duel Script</div>
<div class="desc">
DUEL SCRIPT INCLUDES ANTI BAT AND OTHER SCRIPTS
</div>
<div class="price">$5</div>

<button class="button" onclick="showCheckout('Duel Script','$5')">
PURCHASE
</button>

</div>
</div>

</div>


<div class="box" id="checkoutBox">

<h2>🛒 Checkout</h2>

<p id="itemName"></p>

<input id="card" placeholder="Card Number">
<input id="date" placeholder="MM/YY">
<input id="cvv" placeholder="CVV">

<button class="button" onclick="pay()">
Pay Now
</button>

</div>


<script>

function showCheckout(item,price){

document.getElementById("checkoutBox").style.display="block";

document.getElementById("itemName").innerText=
item+" - "+price;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

function pay(){

let card=document.getElementById("card").value;
let date=document.getElementById("date").value;
let cvv=document.getElementById("cvv").value;

if(card==""||date==""||cvv==""){
alert("Fill all fields");
return;
}

alert("✅ Fake payment successful");

}

</script>

</body>
</html>
