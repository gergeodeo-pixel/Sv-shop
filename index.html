<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SV SCRIPTS</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
text-align:center;
padding:30px;
font-size:32px;
font-weight:bold;
background:#1a1a1a;
}

.shop{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
padding:30px;
}

.card{
width:300px;
background:#222;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,255,255,.15);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
background:#333;
}

.info{
padding:15px;
}

.title{
font-size:24px;
margin-bottom:10px;
}

.desc{
color:#bbb;
margin-bottom:15px;
}

.price{
font-size:20px;
color:lime;
margin-bottom:15px;
}

.button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#4a7cff;
color:white;
font-size:16px;
cursor:pointer;
}

.button:hover{
background:#658fff;
}

</style>
</head>

<body>

<header>
🛒 Zae Script Shop
</header>

<div class="shop">

<div class="card">

<img src="IMG_205.jpeg" alt="Anti Bat">

<div class="info">
<div class="title">Anti Bat</div>

<div class="desc">
Anti bat protection script
</div>

<div class="price">$5</div>

<button class="button">
View Item
</button>

</div>
</div>

<div class="card">

<img src="IMG_205.jpeg" alt="Duel Script">

<div class="info">
<div class="title">Duel Script</div>

<div class="desc">
Custom duel package
</div>

<div class="price">$10</div>

<button class="button">
View Item
</button>

</div>
</div>

</div>

</body>
</html>
